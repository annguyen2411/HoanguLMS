[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  VITE_API_URL = "https://hoangu-lms-api.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "https://hoangu-lms-api.onrender.com/api/:splat"
  status = 200
  force = true
