<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - HoaNgữ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #dc2626 0%, #eab308 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #dc2626 0%, #eab308 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }
    
    h1 {
      font-size: 32px;
      color: #1f2937;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    p {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #fef3c7;
      border: 2px solid #fbbf24;
      border-radius: 12px;
      margin: 30px 0;
      font-weight: 600;
      color: #92400e;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    .button {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #dc2626 0%, #eab308 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      margin-top: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(220, 38, 38, 0.3);
    }
    
    .features {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 2px solid #f3f4f6;
    }
    
    .feature-list {
      list-style: none;
      text-align: left;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      color: #4b5563;
      font-size: 15px;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Bạn đang offline</h1>
    <p>Không thể kết nối đến máy chủ</p>
    <p style="font-size: 15px; color: #9ca3af;">Vui lòng kiểm tra kết nối internet của bạn</p>
    
    <div class="status">
      <span class="status-dot"></span>
      Đang chờ kết nối...
    </div>
    
    <a href="/" class="button" onclick="window.location.reload(); return false;">
      🔄 Thử lại
    </a>
    
    <div class="features">
      <p style="font-weight: 600; color: #1f2937; margin-bottom: 16px;">
        ✨ Tính năng offline đang hoạt động:
      </p>
      <ul class="feature-list">
        <li class="feature-item">
          <span class="feature-icon">✓</span>
          Các bài học đã tải trước vẫn có thể học
        </li>
        <li class="feature-item">
          <span class="feature-icon">✓</span>
          Tiến độ học tập được lưu tự động
        </li>
        <li class="feature-item">
          <span class="feature-icon">✓</span>
          Dữ liệu sẽ đồng bộ khi có mạng trở lại
        </li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Check connection every 5 seconds
    setInterval(() => {
      fetch('/', { method: 'HEAD' })
        .then(() => {
          window.location.reload();
        })
        .catch(() => {
          // Still offline
        });
    }, 5000);
  </script>
</body>
</html>
