version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hoangu_lms_db
    environment:
      POSTGRES_DB: ${DB_NAME:-hoangu_lms}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hoangu_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoangu_lms_api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-hoangu_lms}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-production-secret-key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hoangu_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hoangu_lms_frontend
    environment:
      VITE_API_URL: http://api:3000
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hoangu_network

volumes:
  postgres_data:

networks:
  hoangu_network:
    driver: bridge
